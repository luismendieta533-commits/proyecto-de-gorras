<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Caps</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Urban Caps</h1>
  <p>Tienda premium de gorras</p>
</header>

<!-- BOTONES FILTRO -->

<div class="filtros">

  <button onclick="filtrar('todas')">
    Todas
  </button>

  <button onclick="filtrar('urbanas')">
    Urbanas
  </button>

  <button onclick="filtrar('deportivas')">
    Deportivas
  </button>

  <button onclick="filtrar('snapback')">
    Snapback
  </button>

</div>

<!-- PRODUCTOS -->

<section class="productos">

  <!-- GORRA 1 -->

  <div class="gorra urbanas">

    <img src="https://images.unsplash.com/photo-1575428652377-a2d80e2277fc?q=80&w=1200&auto=format&fit=crop">

    <div class="info">

      <h2>Gorra Roja</h2>

      <p class="precio">C$700</p>

      <button
        type="button"
        onclick="agregarCarrito('Gorra Roja',700)"
      >
        Comprar
      </button>

    </div>

  </div>

  <!-- GORRA 2 -->

  <div class="gorra deportivas">

    <img src="https://images.unsplash.com/photo-1521369909029-2afed882baee?q=80&w=1200&auto=format&fit=crop">

    <div class="info">

      <h2>Gorra Negra</h2>

      <p class="precio">C$650</p>

      <button
        type="button"
        onclick="agregarCarrito('Gorra Negra',650)"
      >
        Comprar
      </button>

    </div>

  </div>

  <!-- GORRA 3 -->

  <div class="gorra snapback">

    <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1200&auto=format&fit=crop">

    <div class="info">

      <h2>Gorra Blanca</h2>

      <p class="precio">C$750</p>

      <button
        type="button"
        onclick="agregarCarrito('Gorra Blanca',750)"
      >
        Comprar
      </button>

    </div>

  </div>

</section>

<!-- BOTON CARRITO -->

<a href="carrito.html" class="carrito-btn">
  🛒 Ver Carrito
</a>

<!-- SCRIPT -->

<script src="script.js"></script>

</body>
</html>
