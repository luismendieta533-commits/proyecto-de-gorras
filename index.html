<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Caps</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Urban Caps</h1>
  <p>Tienda premium de gorras</p>
</header>

<section class="banner">
  <h2>Las mejores gorras urbanas</h2>
</section>

<section class="productos">

  <div class="gorra">
    <img src="img/gorra1.jpg">
    <div class="info">
      <h3>Gorra Roja</h3>
      <p class="precio">C$700</p>
      <button onclick="comprar()">Comprar</button>
    </div>
  </div>

  <div class="gorra">
    <img src="img/gorra2.jpg">
    <div class="info">
      <h3>Gorra Negra</h3>
      <p class="precio">C$650</p>
      <button onclick="comprar()">Comprar</button>
    </div>
  </div>

  <div class="gorra">
    <img src="img/gorra3.jpg">
    <div class="info">
      <h3>Gorra Blanca</h3>
      <p class="precio">C$750</p>
      <button onclick="comprar()">Comprar</button>
    </div>
  </div>

</section>

<footer>
  © 2026 Urban Caps
</footer>

<script src="script.js"></script>

</body>
</html>
